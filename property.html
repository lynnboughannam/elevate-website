<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property — Elevate Estates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Nunito Sans', sans-serif; background: #EDE8E0; color: #2E1F0E; margin: 0; }
    .font-display { font-family: 'Playfair Display', serif; }
    nav { background: rgba(250,247,243,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(122,82,48,0.12); box-shadow: 0 2px 20px rgba(78,50,25,0.08); position: sticky; top: 0; z-index: 100; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; }
    .badge-luxury { background: #FAF0DC; color: #7A5A0B; }
    .badge-sale   { background: #EFE3D5; color: #4E3219; }
    .badge-rent   { background: #EAF3DE; color: #3B6D11; }
    .ref-block { background: #EFE3D5; border: 1px solid #D4B89A; border-radius: 10px; padding: 10px 16px; display: inline-flex; flex-direction: column; gap: 3px; }
    .ref-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #7A5230; }
    .ref-num   { font-size: 22px; font-weight: 700; color: #4E3219; letter-spacing: 3px; }
    .btn-wa { display: inline-flex; align-items: center; gap: 8px; background: #25D366; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .btn-wa:hover { background: #1da851; transform: translateY(-2px); }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #7A5230; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .btn-primary:hover { background: #4E3219; transform: translateY(-2px); }
    .amenity-chip { background: #EDE8E0; border: 1px solid rgba(122,82,48,0.15); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #4E3219; display: inline-flex; align-items: center; gap: 6px; }
    .detail-item { display: flex; flex-direction: column; gap: 4px; padding: 16px; background: #EDE8E0; border-radius: 12px; }
    .detail-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #A87850; }
    .detail-value { font-size: 15px; font-weight: 700; color: #4E3219; }
    .sticky-cta { position: sticky; top: 86px; }
    .similar-card { background: #FAF7F3; border-radius: 14px; overflow: hidden; border: 1px solid rgba(122,82,48,0.1); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .similar-card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(122,82,48,0.15); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #EDE8E0; }
    ::-webkit-scrollbar-thumb { background: #A87850; border-radius: 3px; }

    /* ══ RESPONSIVE ════════════════════════════════════════ */
    @media (max-width: 900px) {
      #prop-layout { grid-template-columns: 1fr !important; }
      .sticky-cta { position: static !important; }
      #page-content { padding: 1rem !important; }
    }
    @media (max-width: 600px) {
      #page-content { padding: 0.75rem !important; }
      .btn-wa, .btn-primary { padding: 12px 16px !important; font-size: 14px !important; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div style="max-width:1280px;margin:0 auto;padding:0 2rem;height:70px;display:flex;align-items:center;justify-content:space-between">
    <a href="index.html"><img src="brand_Assets/dark-elevate-logo.png" alt="Elevate Estates" style="height:32px;width:auto"></a>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <a href="listings.html" style="font-size:14px;font-weight:600;color:#4E3219;text-decoration:none">← All Properties</a>
      <a href="submit.html" style="background:#7A5230;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;transition:background 0.2s" onmouseover="this.style.background='#4E3219'" onmouseout="this.style.background='#7A5230'">List Property</a>
    </div>
  </div>
</nav>

<!-- CONTENT — rendered by JS -->
<div id="page-content" style="max-width:1280px;margin:0 auto;padding:2rem"></div>

<!-- NOT FOUND -->
<div id="not-found" style="display:none;text-align:center;padding:6rem 2rem">
  <div style="font-size:64px;margin-bottom:1rem">🏡</div>
  <h2 style="font-family:'Playfair Display',serif;font-size:32px;color:#4E3219;margin-bottom:1rem">Property not found</h2>
  <p style="color:#999;margin-bottom:2rem">This listing may have been removed or the link is incorrect.</p>
  <a href="listings.html" style="background:#7A5230;color:#fff;padding:12px 28px;border-radius:10px;font-weight:700;text-decoration:none">Browse all listings</a>
</div>

<!-- FOOTER -->
<footer style="background:#2E1F0E;color:rgba(255,255,255,0.55);padding:2.5rem 2rem;margin-top:3rem">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
    <img src="brand_Assets/white-elevate-logo.png" alt="Elevate Estates" style="height:28px;width:auto">
    <p style="font-size:13px">© 2025 Elevate Estates · Beirut, Lebanon</p>
    <a href="listings.html" style="font-size:13px;color:rgba(255,255,255,0.55);text-decoration:none" onmouseover="this.style.color='#A87850'" onmouseout="this.style.color='rgba(255,255,255,0.55)'">Browse Properties</a>
  </div>
</footer>

<script src="data.js"></script>
<script>
  initStore();

  const id = new URLSearchParams(location.search).get('id');
  const listing = id ? getListing(id) : null;

  if (!listing || listing.status !== 'approved') {
    document.getElementById('not-found').style.display = 'block';
  } else {
    document.title = `${listing.title} — Elevate Estates`;

    const badge = listing.tag === 'luxury'
      ? '<span class="badge badge-luxury">Luxury</span>'
      : listing.purpose === 'rent'
        ? '<span class="badge badge-rent">For Rent</span>'
        : '<span class="badge badge-sale">For Sale</span>';

    const purposeText = listing.purpose === 'rent' ? 'For Rent' : 'For Sale';
    const typeText = listing.type.charAt(0).toUpperCase() + listing.type.slice(1);

    const beds  = listing.beds  > 0 ? `<div class="detail-item"><span class="detail-label">Bedrooms</span><span class="detail-value">${listing.beds}</span></div>` : '';
    const baths = listing.baths > 0 ? `<div class="detail-item"><span class="detail-label">Bathrooms</span><span class="detail-value">${listing.baths}</span></div>` : '';
    const parking = listing.parking > 0 ? `<div class="detail-item"><span class="detail-label">Parking</span><span class="detail-value">${listing.parking}</span></div>` : '';

    const amenitiesHtml = (listing.amenities || []).map(a => `
      <div class="amenity-chip">
        <svg width="14" height="14" fill="none" stroke="#7A5230" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        ${a}
      </div>`).join('');

    // Similar listings
    const similar = getListings()
      .filter(l => l.status === 'approved' && l.id !== listing.id && l.type === listing.type)
      .slice(0, 3);
    const similarHtml = similar.map(l => `
      <a href="property.html?id=${l.id}" class="similar-card" style="text-decoration:none;display:block">
        <div style="height:160px;overflow:hidden;position:relative">
          <img src="${l.img}" alt="${l.title}" style="width:100%;height:100%;object-fit:cover">
          <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(46,31,14,0.4),transparent)"></div>
        </div>
        <div style="padding:1rem">
          <div style="font-size:16px;font-weight:700;color:#4E3219;margin-bottom:2px">${formatPrice(l.price,l.purpose)}</div>
          <div style="font-size:13px;font-weight:600;color:#2E1F0E;margin-bottom:4px">${l.title}</div>
          <div style="font-size:11px;color:#999">${l.location}</div>
        </div>
      </a>`).join('');

    document.getElementById('page-content').innerHTML = `
      <!-- Breadcrumb -->
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap">
        <a href="index.html" style="font-size:13px;color:#A87850;text-decoration:none">Home</a>
        <span style="font-size:13px;color:#ccc">/</span>
        <a href="listings.html" style="font-size:13px;color:#A87850;text-decoration:none">Properties</a>
        <span style="font-size:13px;color:#ccc">/</span>
        <span style="font-size:13px;color:#777">${listing.title}</span>
      </div>

      <div id="prop-layout" style="display:grid;grid-template-columns:1fr 360px;gap:2.5rem;align-items:start">

        <!-- LEFT COLUMN -->
        <div>
          <!-- Main image -->
          <div style="border-radius:16px;overflow:hidden;height:480px;position:relative;margin-bottom:1rem">
            <img src="${listing.img}" alt="${listing.title}" style="width:100%;height:100%;object-fit:cover">
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(46,31,14,0.4) 0%,transparent 50%)"></div>
            <div style="position:absolute;top:16px;left:16px;display:flex;gap:8px">
              ${badge}
              <span class="badge" style="background:rgba(250,247,243,0.9);color:#4E3219">${typeText}</span>
            </div>
            <div style="position:absolute;bottom:16px;right:16px;background:rgba(46,31,14,0.7);backdrop-filter:blur(8px);color:rgba(255,255,255,0.8);font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px">
              📷 Contact us for full photo gallery
            </div>
          </div>
          <!-- Thumbnail strip -->
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:2rem">
            ${[1,2,3,4].map(i => `
              <div style="height:80px;border-radius:10px;overflow:hidden;opacity:${i===1?1:0.6};cursor:pointer;transition:opacity 0.2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=${i===1?1:0.6}">
                <img src="https://picsum.photos/seed/${listing.id}-${i}/200/80" alt="" style="width:100%;height:100%;object-fit:cover">
              </div>`).join('')}
          </div>

          <!-- Title & price -->
          <div style="margin-bottom:2rem">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem">
              <div>
                <h1 class="font-display" style="font-size:clamp(24px,4vw,36px);color:#4E3219;letter-spacing:-0.5px;margin-bottom:8px">${listing.title}</h1>
                <p style="font-size:15px;color:#777;display:flex;align-items:center;gap:6px">
                  <svg width="14" height="14" fill="none" stroke="#A87850" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${listing.location}
                </p>
              </div>
              <div class="font-display" style="font-size:clamp(24px,4vw,34px);color:#7A5230;font-weight:700;letter-spacing:-0.5px;text-align:right">
                ${formatPrice(listing.price, listing.purpose)}
              </div>
            </div>
          </div>

          <!-- Key stats -->
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:2rem">
            ${beds}${baths}
            <div class="detail-item"><span class="detail-label">Area</span><span class="detail-value">${listing.sqm} m²</span></div>
            <div class="detail-item"><span class="detail-label">Type</span><span class="detail-value">${typeText}</span></div>
            <div class="detail-item"><span class="detail-label">Purpose</span><span class="detail-value">${purposeText}</span></div>
            <div class="detail-item"><span class="detail-label">Floor</span><span class="detail-value">${listing.floor || '—'}</span></div>
            <div class="detail-item"><span class="detail-label">Age</span><span class="detail-value">${listing.age || '—'}</span></div>
            ${parking}
          </div>

          <!-- Description -->
          <div style="background:#FAF7F3;border-radius:16px;padding:2rem;border:1px solid rgba(122,82,48,0.1);margin-bottom:2rem">
            <h2 style="font-size:16px;font-weight:700;color:#4E3219;margin-bottom:1rem;display:flex;align-items:center;gap:8px">
              <span style="width:4px;height:20px;background:#7A5230;border-radius:2px;display:inline-block"></span>
              Description
            </h2>
            <p style="font-size:15px;line-height:1.8;color:#555">${listing.description}</p>
          </div>

          <!-- Amenities -->
          <div style="background:#FAF7F3;border-radius:16px;padding:2rem;border:1px solid rgba(122,82,48,0.1);margin-bottom:2rem">
            <h2 style="font-size:16px;font-weight:700;color:#4E3219;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px">
              <span style="width:4px;height:20px;background:#7A5230;border-radius:2px;display:inline-block"></span>
              Amenities & Features
            </h2>
            <div style="display:flex;flex-wrap:wrap;gap:8px">${amenitiesHtml}</div>
          </div>

          <!-- Similar listings -->
          ${similar.length > 0 ? `
          <div>
            <h2 style="font-size:18px;font-weight:700;color:#4E3219;margin-bottom:1.25rem;font-family:'Playfair Display',serif">Similar Properties</h2>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">${similarHtml}</div>
          </div>` : ''}
        </div>

        <!-- RIGHT STICKY COLUMN -->
        <aside class="sticky-cta">
          <!-- Contact card -->
          <div style="background:#FAF7F3;border-radius:16px;padding:1.75rem;border:1px solid rgba(122,82,48,0.1);box-shadow:0 8px 40px rgba(122,82,48,0.12);margin-bottom:1rem">
            <div class="ref-block" style="margin-bottom:1.25rem">
              <span class="ref-label">Reference number</span>
              <span class="ref-num">${listing.id}</span>
            </div>
            <div style="margin-bottom:1.5rem">
              <div style="font-size:13px;color:#999;margin-bottom:4px">Asking price</div>
              <div class="font-display" style="font-size:28px;color:#4E3219;font-weight:700;letter-spacing:-0.5px">${formatPrice(listing.price, listing.purpose)}</div>
            </div>
            <p style="font-size:13px;color:#888;line-height:1.6;margin-bottom:1.5rem">Quote the reference number above when contacting us about this property.</p>
            <div style="display:flex;flex-direction:column;gap:10px">
              <a href="https://wa.me/${listing.whatsapp}?text=Hi%2C+I'm+interested+in+property+${listing.id}+%E2%80%94+${encodeURIComponent(listing.title)}" target="_blank" class="btn-wa" style="width:100%;justify-content:center">
                <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.855L.057 23.428a.75.75 0 00.921.921l5.573-1.475A11.953 11.953 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.713 9.713 0 01-4.953-1.355l-.355-.212-3.683.974.974-3.565-.23-.368A9.72 9.72 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
                WhatsApp Agent
              </a>
              <a href="tel:${listing.phone}" class="btn-primary" style="width:100%;justify-content:center;font-size:14px">
                <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.1 2.18 2 2 0 012.08.04h3A2 2 0 017.1 1.7c.388 1.21.87 2.38 1.43 3.51a2 2 0 01-.45 2.11L6.91 8.5a16 16 0 006.6 6.6l1.18-1.17a2 2 0 012.11-.45c1.13.56 2.3 1.04 3.51 1.43a2 2 0 011.66 2.01z"/></svg>
                Call Agent
              </a>
            </div>
          </div>

          <!-- Trust signals -->
          <div style="background:#EFE3D5;border:1px solid #D4B89A;border-radius:12px;padding:1.25rem">
            <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7A5230;margin-bottom:12px">Elevate Estates Promise</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#555">
                <svg width="14" height="14" fill="none" stroke="#7A5230" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                Listing verified by our team
              </div>
              <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#555">
                <svg width="14" height="14" fill="none" stroke="#7A5230" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                Direct owner/agent contact
              </div>
              <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#555">
                <svg width="14" height="14" fill="none" stroke="#7A5230" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                No hidden fees
              </div>
              <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#555">
                <svg width="14" height="14" fill="none" stroke="#7A5230" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                Unique EE reference system
              </div>
            </div>
          </div>
        </aside>
      </div>`;
  }
</script>
</body>
</html>
